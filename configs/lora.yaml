method: lora
model_name: Qwen/Qwen2.5-1.5B-Instruct
dataset_name: knkarthick/samsum
output_dir: outputs/lora

seed: 42

max_train_samples: 2500
max_eval_samples: 300
max_test_samples: 300

max_length: 512
max_input_length: 448
max_new_tokens: 96

num_train_epochs: 1
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8

learning_rate: 0.00005
weight_decay: 0.0
warmup_ratio: 0.1
lr_scheduler_type: cosine

logging_steps: 10
eval_steps: 100
save_steps: 100

bf16: false
fp16: true
gradient_checkpointing: true

lora_r: 4
lora_alpha: 8
lora_dropout: 0.05

target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

method: adalora
model_name: Qwen/Qwen2.5-1.5B-Instruct
dataset_name: knkarthick/samsum
output_dir: outputs/final_adalora_all

seed: 42

max_train_samples: 12000
max_eval_samples: 800
max_test_samples: 300

max_length: 512
max_input_length: 448
max_new_tokens: 96

num_train_epochs: 3
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8

learning_rate: 0.00008
weight_decay: 0.0
warmup_ratio: 0.12
lr_scheduler_type: cosine

logging_steps: 20
eval_steps: 300
save_steps: 300

bf16: false
fp16: true
gradient_checkpointing: true

lora_alpha: 24
lora_dropout: 0.03

adalora_init_r: 12
adalora_target_r: 8
adalora_beta1: 0.85
adalora_beta2: 0.85
adalora_tinit: 200
adalora_tfinal: 1800
adalora_deltaT: 20
adalora_total_step: 2250

target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

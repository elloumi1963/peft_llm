method: adalora
model_name: Qwen/Qwen2.5-1.5B-Instruct
dataset_name: knkarthick/samsum
output_dir: outputs/favored_adalora_all

seed: 42

max_train_samples: 999999
max_eval_samples: 800
max_test_samples: 800

max_length: 512
max_input_length: 448
max_new_tokens: 96

num_train_epochs: 5
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8

learning_rate: 0.00004
weight_decay: 0.01
warmup_ratio: 0.15
lr_scheduler_type: cosine

logging_steps: 20
eval_steps: 400
save_steps: 400

bf16: false
fp16: true
gradient_checkpointing: true

lora_alpha: 32
lora_dropout: 0.05

adalora_init_r: 16
adalora_target_r: 12
adalora_beta1: 0.85
adalora_beta2: 0.85
adalora_tinit: 800
adalora_tfinal: 3600
adalora_deltaT: 20
adalora_total_step: 4605

target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
